<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=680">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 680px; height: 510px; overflow: hidden; background: #060606; }

.root {
  width: 680px;
  height: 510px;
  background: #060606;
  font-family: 'IBM Plex Mono', monospace;
  color: #F0EDE8;
  overflow: hidden;
  position: relative;
}

/* Browser chrome */
.chrome {
  height: 28px;
  background: #0c0c0c;
  border-bottom: 1px solid #1a1a1a;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  position: relative;
  z-index: 10;
}
.chrome-dots { display: flex; gap: 5px; }
.chrome-dot { width: 9px; height: 9px; border-radius: 50%; background: #252525; }
.chrome-url {
  flex: 1;
  background: #161616;
  border-radius: 2px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #383838;
  font-family: 'IBM Plex Mono', monospace;
}

/* Background grid — static */
.bg-grid {
  position: absolute;
  inset: 28px 0 0 0;
  z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
  background-position: -5px -4px;
}

/* Content layer */
.content { position: relative; z-index: 2; }

/* Nav */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 44px;
  border-bottom: 1px solid rgba(255,255,255,0.045);
}
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 300; color: #F0EDE8; letter-spacing: 0.04em; }
.nav-links { display: flex; align-items: center; gap: 36px; }
.nav-link { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }
.nav-link.active { color: #F0EDE8; border-bottom: 1px solid #B89A6A; padding-bottom: 2px; }
.nav-link.inactive { color: #383838; }
.nav-available { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #B89A6A; letter-spacing: 0.1em; opacity: 0.6; }

/* Hero */
.hero {
  padding: 36px 40px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.045);
}
.hero-season-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: #30302c;
  text-transform: uppercase;
  margin-bottom: 10px;
  opacity: 0;
}

/* NAME — frozen mid-reveal: 70% visible, clip-path from right */
.hero-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 56px;
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.01em;
  color: #F0EDE8;
  white-space: nowrap;
  margin-bottom: 10px;
  clip-path: inset(0 30% 0 0);
  overflow: hidden;
}

/* Subtitle — frozen mid-arrival */
.hero-subtitle {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #6E665C;
  margin-bottom: 14px;
  opacity: 0.48;
  transform: translateY(4px);
}

/* Tags — frozen at entry (visible but fading) */
.hero-tags {
  display: flex;
  gap: 8px;
  margin-bottom: 22px;
  opacity: 0.22;
}
.hero-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: #403932;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid #232020;
  padding: 3px 8px;
}

/* Scroll indicator */
.scroll-indicator {
  display: flex;
  align-items: center;
  gap: 10px;
}
.scroll-line {
  width: 1px;
  height: 28px;
  background: #1c1c1c;
  position: relative;
  overflow: hidden;
}
.scroll-glow {
  position: absolute;
  inset: 0;
  background: #B89A6A;
  opacity: 0.55;
}
.scroll-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  color: #2e2e2e;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

/* Project grid */
.grid {
  padding: 18px 40px 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card { }

/* Card states — frozen mid-stagger */
.card-1 { opacity: 1; transform: translateY(0); }
.card-2 { opacity: 0.42; transform: translateY(16px); }
.card-3 { opacity: 0; transform: translateY(22px); }
.card-4 { opacity: 0.76; transform: translateY(7px); }

.card-thumb {
  height: 88px;
  border-radius: 3px;
  margin-bottom: 7px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  padding: 9px;
}
.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.03em;
  position: relative;
  z-index: 1;
}
.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.card-category {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: #383838;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.card-year {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: #282828;
}

/* Lyra thumbnail */
.thumb-lyra {
  background: linear-gradient(140deg, #180C03, #58300E);
}
.thumb-lyra::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 68% 24%, rgba(196,108,36,0.42), transparent 58%);
}
.thumb-lyra .card-name { color: #F0EDE8; }

/* Orbital thumbnail */
.thumb-orbital {
  background: linear-gradient(140deg, #030819, #0B1D5A);
}
.thumb-orbital::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 28% 68%, rgba(66,104,210,0.38), transparent 58%);
}
.thumb-orbital .card-name { color: #B4C4E4; }

/* Meridian thumbnail */
.thumb-meridian {
  background: #111110;
  border: 1px solid #1e1e1c;
}
.thumb-meridian .card-name { color: #F0EDE8; }
.meridian-lines {
  position: absolute;
  top: 14px;
  left: 14px;
  right: 14px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.meridian-line { height: 0.5px; }
.meridian-line-1 { background: rgba(240,236,228,0.10); }
.meridian-line-2 { background: rgba(240,236,228,0.06); }
.meridian-line-3 { background: rgba(240,236,228,0.08); }

/* Aether thumbnail */
.thumb-aether {
  background: linear-gradient(140deg, #020E0D, #062E2C);
}
.thumb-aether::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 34%, rgba(16,118,106,0.32), transparent 58%);
}
.thumb-aether .card-name { color: #A0CECC; }

/* Custom cursor — dot leads, ring trails */
.cursor-dot {
  position: absolute;
  z-index: 20;
  pointer-events: none;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: rgba(240,236,228,0.82);
  top: 40%;
  left: 36%;
  margin-left: -5.5px;
  margin-top: -5.5px;
}
.cursor-ring {
  position: absolute;
  z-index: 19;
  pointer-events: none;
  width: 27px;
  height: 27px;
  border-radius: 50%;
  border: 1px solid rgba(184,154,106,0.4);
  top: 41.5%;
  left: 38%;
  margin-left: -13.5px;
  margin-top: -13.5px;
}
</style>
</head>
<body>
<div class="root">

  <div class="chrome">
    <div class="chrome-dots">
      <div class="chrome-dot"></div>
      <div class="chrome-dot"></div>
      <div class="chrome-dot"></div>
    </div>
    <div class="chrome-url">kaelnordvik.com</div>
  </div>

  <div class="bg-grid"></div>

  <div class="content">
    <nav class="nav">
      <span class="nav-logo">KN</span>
      <div class="nav-links">
        <span class="nav-link active">Work</span>
        <span class="nav-link inactive">About</span>
        <span class="nav-link inactive">Contact</span>
      </div>
      <span class="nav-available">◦&nbsp;Available for work</span>
    </nav>

    <div class="hero">
      <div class="hero-name">KAEL NORDVIK</div>
      <div class="hero-subtitle">Senior Product Designer&nbsp;&nbsp;·&nbsp;&nbsp;Motion &amp; Identity&nbsp;&nbsp;·&nbsp;&nbsp;Amsterdam</div>
      <div class="hero-tags">
        <span class="hero-tag">Brand</span>
        <span class="hero-tag">Motion</span>
        <span class="hero-tag">Systems</span>
        <span class="hero-tag">Identity</span>
      </div>
      <div class="scroll-indicator">
        <div class="scroll-line"><div class="scroll-glow"></div></div>
        <span class="scroll-text">Scroll to explore</span>
      </div>
    </div>

    <div class="grid">

      <div class="card card-1">
        <div class="card-thumb thumb-lyra">
          <span class="card-name">Lyra</span>
        </div>
        <div class="card-meta">
          <span class="card-category">Brand Identity</span>
          <span class="card-year">2024</span>
        </div>
      </div>

      <div class="card card-2">
        <div class="card-thumb thumb-orbital">
          <span class="card-name">Orbital</span>
        </div>
        <div class="card-meta">
          <span class="card-category">Product Design</span>
          <span class="card-year">2023</span>
        </div>
      </div>

      <div class="card card-3">
        <div class="card-thumb thumb-meridian">
          <div class="meridian-lines">
            <div class="meridian-line meridian-line-1"></div>
            <div class="meridian-line meridian-line-2"></div>
            <div class="meridian-line meridian-line-3"></div>
          </div>
          <span class="card-name">Meridian</span>
        </div>
        <div class="card-meta">
          <span class="card-category">Type Systems</span>
          <span class="card-year">2023</span>
        </div>
      </div>

      <div class="card card-4">
        <div class="card-thumb thumb-aether">
          <span class="card-name">Aether</span>
        </div>
        <div class="card-meta">
          <span class="card-category">Web Experience</span>
          <span class="card-year">2022</span>
        </div>
      </div>

    </div>
  </div>

  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

</div>
</body>
</html>
