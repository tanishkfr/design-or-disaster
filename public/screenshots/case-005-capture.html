<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=680">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 680px; height: 510px; overflow: hidden; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; color: #111827; background: #f3f4f6; }

/* ── Browser chrome ─────────────────────────────── */
.chrome {
  height: 28px;
  background: #1c1c1c;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
}
.chrome-dots { display: flex; gap: 5px; }
.chrome-dot { width: 9px; height: 9px; border-radius: 50%; background: #3a3a3a; }
.chrome-url {
  flex: 1;
  background: #2e2e2e;
  border-radius: 3px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #888;
  letter-spacing: 0.02em;
}

/* ── Navigation bar ─────────────────────────────────
   Prosecution exhibit: logo left, hamburger right,
   several hundred pixels of horizontal void between them.
   At 680px desktop width, a category row (Flights · Hotels · Cars · Packages)
   would occupy this space at zero layout or visual cost.
   The space constraint being solved does not exist. */
.nav {
  height: 44px;
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
}

/* Logo: clean wordmark, no icon.
   Prosecution: clearly legible, clearly positioned left — the void begins here. */
.nav-logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: #111827;
  text-transform: uppercase;
}
.nav-logo-accent { color: #2563eb; }

/* Hamburger trigger: three lines, 22×12px.
   Prosecution: ~0.1% of viewport area; contains 100% of navigational information.
   Defense: culturally recognised pattern by 2020; cognitive load of trigger is near-zero. */
.hamburger {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 6px 4px;
  cursor: pointer;
}
.hamburger-bar {
  width: 22px;
  height: 2px;
  background: #374151;
  border-radius: 1px;
}

/* ── Hero section ────────────────────────────────────
   Defense anchor: the primary task — destination + dates + search —
   completes from this surface without opening the hamburger once.
   Prosecution: no category names, no product breadth, wrong emotional register.
   Blue gradient evokes sky. Does not communicate where you might go. */
.hero {
  height: 220px;
  background: linear-gradient(155deg, #1a3a6e 0%, #1c5aa0 50%, #2a7ecf 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 40px;
  gap: 6px;
}
.hero-headline {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  letter-spacing: -0.02em;
  line-height: 1.2;
}
.hero-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.68);
  text-align: center;
  margin-bottom: 4px;
}

/* Search bar: three fields + button.
   Complete, functional-looking. From / To / Dates.
   Defense: for users arriving with formed intent, this surface is complete.
   The stripped interface removes competing elements and simplifies orientation. */
.search-bar {
  width: 100%;
  max-width: 580px;
  background: #fff;
  border-radius: 10px;
  padding: 5px;
  display: flex;
  align-items: stretch;
  gap: 1px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.22);
}
.search-field {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 6px 12px;
  border-right: 1px solid #e5e7eb;
  min-width: 0;
}
.search-field-last { border-right: none; }
.search-label {
  font-size: 9px;
  font-weight: 700;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 2px;
}
.search-value {
  font-size: 12px;
  color: #9ca3af;
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.search-btn {
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 0 20px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.01em;
  cursor: pointer;
  flex-shrink: 0;
  height: 38px;
  align-self: center;
  white-space: nowrap;
}

/* ── Featured destinations ───────────────────────────
   Partial visibility — cards cut at bottom edge.
   Delight prosecution: destination names, prices, travel times.
   No emotional argument for booking here made. No sense of possibility.
   The consideration-set for a traveller who has not decided where to go
   is entirely absent from the visible surface. */
.featured {
  height: 218px;
  background: #f3f4f6;
  padding: 16px 20px 0;
  overflow: hidden;
}
.featured-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #6b7280;
  margin-bottom: 12px;
}
.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.card-img {
  height: 96px;
}
.card-body {
  padding: 11px 13px 11px;
}
.card-dest {
  font-size: 13px;
  font-weight: 700;
  color: #111827;
}
.card-meta {
  font-size: 11px;
  color: #6b7280;
  margin-top: 2px;
}
.card-price {
  font-size: 14px;
  font-weight: 700;
  color: #2563eb;
  margin-top: 6px;
}
.card-action {
  margin-top: 8px;
  height: 28px;
  border: 1.5px solid #2563eb;
  border-radius: 5px;
  background: transparent;
  color: #2563eb;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
}
</style>
</head>
<body>

<!-- Browser chrome -->
<div class="chrome">
  <div class="chrome-dots">
    <div class="chrome-dot"></div>
    <div class="chrome-dot"></div>
    <div class="chrome-dot"></div>
  </div>
  <div class="chrome-url">faraway.example</div>
</div>

<!-- Navigation bar.
     Logo left. Hamburger right. Nothing between them.
     The entire product offering — flights, hotels, cars, packages — is hidden behind three horizontal lines.
     At this viewport width, a category tab row would cost nothing. -->
<nav class="nav">
  <div class="nav-logo">FAR<span class="nav-logo-accent">AWAY</span></div>
  <div class="hamburger" aria-label="Menu">
    <div class="hamburger-bar"></div>
    <div class="hamburger-bar"></div>
    <div class="hamburger-bar"></div>
  </div>
</nav>

<!-- Hero section.
     Search bar: the defense's primary evidence.
     Complete. Functional. From / To / Dates / Search.
     Prosecution: no destination listed, no category named, no consideration-set visible. -->
<section class="hero">
  <div class="hero-headline">Search flights, hotels and more.</div>
  <div class="hero-sub">Find the right trip at the right price.</div>
  <div class="search-bar">
    <div class="search-field">
      <span class="search-label">From</span>
      <span class="search-value">City or airport</span>
    </div>
    <div class="search-field">
      <span class="search-label">To</span>
      <span class="search-value">City or airport</span>
    </div>
    <div class="search-field search-field-last">
      <span class="search-label">Dates</span>
      <span class="search-value">Add dates</span>
    </div>
    <button class="search-btn">Search</button>
  </div>
</section>

<!-- Featured destinations — partial visibility implies more below.
     Card "View deals" button is cut at the bottom edge.
     The cards show destinations exist but do not name the full product taxonomy.
     A user who does not yet know where they want to go has no surface to browse. -->
<section class="featured">
  <div class="featured-label">Popular destinations</div>
  <div class="cards">
    <div class="card">
      <div class="card-img" style="background: linear-gradient(145deg, #f59e0b, #d97706);"></div>
      <div class="card-body">
        <div class="card-dest">New York</div>
        <div class="card-meta">Direct · 7h 15m</div>
        <div class="card-price">From £389</div>
        <button class="card-action">View deals</button>
      </div>
    </div>
    <div class="card">
      <div class="card-img" style="background: linear-gradient(145deg, #10b981, #047857);"></div>
      <div class="card-body">
        <div class="card-dest">Tokyo</div>
        <div class="card-meta">1 stop · 13h 40m</div>
        <div class="card-price">From £672</div>
        <button class="card-action">View deals</button>
      </div>
    </div>
    <div class="card">
      <div class="card-img" style="background: linear-gradient(145deg, #ef4444, #b91c1c);"></div>
      <div class="card-body">
        <div class="card-dest">Barcelona</div>
        <div class="card-meta">Direct · 2h 05m</div>
        <div class="card-price">From £94</div>
        <button class="card-action">View deals</button>
      </div>
    </div>
  </div>
</section>

</body>
</html>
