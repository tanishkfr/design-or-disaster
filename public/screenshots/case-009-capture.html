<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 375px;
  height: 812px;
  overflow: hidden;
  font-family: -apple-system, 'Helvetica Neue', Helvetica, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Wallpaper ─────────────────────────────────────────────────────────────── */
/* iOS 7.0 default wallpaper approximation: deep blue with colored bokeh lights.
   The wallpaper is part of the defense — it communicates depth through light,
   not through the skeuomorphic shadows and bevels iOS 6 used. */
.wallpaper {
  position: fixed;
  inset: 0;
  background-color: #090f1e;
  background-image:
    radial-gradient(circle 110px at 15% 25%, rgba(80, 148, 255, 0.42) 0%, transparent 65%),
    radial-gradient(circle 80px at 82% 15%, rgba(148, 80, 255, 0.35) 0%, transparent 65%),
    radial-gradient(circle 140px at 55% 52%, rgba(40, 108, 210, 0.28) 0%, transparent 65%),
    radial-gradient(circle 90px at 78% 68%, rgba(108, 40, 220, 0.32) 0%, transparent 65%),
    radial-gradient(circle 70px at 10% 72%, rgba(40, 180, 255, 0.25) 0%, transparent 65%),
    radial-gradient(circle 55px at 48% 85%, rgba(80, 200, 150, 0.2) 0%, transparent 65%),
    radial-gradient(circle 65px at 92% 88%, rgba(200, 80, 130, 0.22) 0%, transparent 65%),
    linear-gradient(160deg, #182848 0%, #0d1c36 45%, #060c1a 100%);
}

/* ── Status bar ─────────────────────────────────────────────────────────────── */
/*
  THE CORE CHARGE — VISIBLE BEFORE ANNOTATIONS:
  Every element in this bar uses font-weight: 200 (Ultralight).
  The time "9:41" reads at the exact same visual weight as "Messages" beneath
  the icon below it. The typography makes no distinction between:
  — system status information (time, battery)
  — icon labels (tap target identifiers)
  This is one of the specific charges Apple corrected in iOS 7.1.
*/
.status-bar {
  position: relative;
  z-index: 20;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 8px;
}

.status-time {
  font-size: 12px;
  font-weight: 200;    /* ← Ultralight — same weight as icon labels */
  color: #ffffff;
  letter-spacing: -0.4px;
}

.status-right {
  display: flex;
  align-items: center;
  gap: 5px;
}

.signal {
  display: flex;
  align-items: flex-end;
  gap: 1.5px;
}
.signal-bar {
  width: 3px;
  background: #fff;
  border-radius: 0.5px;
}
.signal-bar:nth-child(1) { height: 4px; }
.signal-bar:nth-child(2) { height: 6px; }
.signal-bar:nth-child(3) { height: 8px; }
.signal-bar:nth-child(4) { height: 10px; }
.signal-bar:nth-child(5) { height: 12px; opacity: 0.28; }

.wifi-icon {
  width: 14px;
  height: 10px;
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.wifi-arc {
  position: absolute;
  border: 1.5px solid #fff;
  border-bottom: none;
  border-radius: 50% 50% 0 0;
}
.wifi-arc:nth-child(1) { width: 14px; height: 7px; bottom: 2px; }
.wifi-arc:nth-child(2) { width: 9px; height: 5px; bottom: 2px; }
.wifi-arc:nth-child(3) { width: 4px; height: 3px; bottom: 2px; }
.wifi-dot {
  position: absolute;
  bottom: 0;
  width: 3px;
  height: 3px;
  background: #fff;
  border-radius: 50%;
}

.battery-wrap {
  display: flex;
  align-items: center;
  gap: 3px;
}
.battery-pct {
  font-size: 11px;
  font-weight: 200;    /* ← same Ultralight weight */
  color: #ffffff;
  letter-spacing: -0.3px;
}
.battery-body {
  width: 22px;
  height: 11px;
  border: 1px solid rgba(255,255,255,0.72);
  border-radius: 2.5px;
  padding: 1.5px;
  position: relative;
}
.battery-body::after {
  content: '';
  position: absolute;
  right: -4px;
  top: 50%;
  transform: translateY(-50%);
  width: 2px;
  height: 5px;
  background: rgba(255,255,255,0.5);
  border-radius: 0 1px 1px 0;
}
.battery-fill {
  width: 70%;
  height: 100%;
  background: #fff;
  border-radius: 1px;
}

/* ── Screen content ─────────────────────────────────────────────────────────── */
.screen {
  position: relative;
  z-index: 10;
  height: 792px; /* 812 - 20px status bar */
  display: flex;
  flex-direction: column;
}

/* ── Icon grid ──────────────────────────────────────────────────────────────── */
.icon-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(5, 1fr);
  padding: 8px 2px 4px;
  align-content: space-evenly;
}

/* ── Icon wrapper ───────────────────────────────────────────────────────────── */
.iw {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 4px 4px 4px;
}

/* THE CORE CHARGE:
   iOS 6 icons had gloss overlays, drop shadows, and bevels signalling "tappable."
   iOS 7 icons are flat coloured squares.
   Nothing on this screen signals which elements are interactive vs static —
   the affordance vocabulary was removed without a replacement. */
.ic {
  width: 60px;
  height: 60px;
  border-radius: 13.5px;  /* iOS squircle approximation */
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  /* NO box-shadow. NO border. NO bevel.
     This is deliberate — it is also the charge. */
}

/* THE READABILITY CHARGE:
   Icon labels at 11px / font-weight 200.
   Same visual weight as status bar elements above them.
   In outdoor or ambient light, these labels approach invisibility.
   Apple issued a system-wide type weight correction within 6 months. */
.il {
  font-size: 11px;
  font-weight: 200;    /* ← Ultralight throughout. This is the charge. */
  color: rgba(255, 255, 255, 0.95);
  text-align: center;
  line-height: 1.1;
  letter-spacing: -0.1px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.65);
  max-width: 72px;
}

/* ── Dock ───────────────────────────────────────────────────────────────────── */
/* The translucent dock was a significant visual statement:
   iOS 6 used a heavy reflective glass shelf.
   iOS 7 replaced it with a frosted translucency showing wallpaper beneath.
   This is part of the defense — the dock is genuinely elegant.
   It is also part of the charge — the translucency reduces visual separation. */
.dock-outer {
  padding: 0 14px 12px;
}
.dock {
  background: rgba(255, 255, 255, 0.10);
  backdrop-filter: blur(28px) saturate(1.4);
  -webkit-backdrop-filter: blur(28px) saturate(1.4);
  border: 0.5px solid rgba(255,255,255,0.14);
  border-radius: 20px;
  padding: 6px 4px;
  display: flex;
  justify-content: space-around;
}
.dock .iw {
  padding: 4px 2px 4px;
}
.dock .ic {
  width: 58px;
  height: 58px;
}

/* ── Page indicator dots ────────────────────────────────────────────────────── */
.page-dots {
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}
.page-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
}
.page-dot.active {
  background: rgba(255,255,255,0.88);
}

/* ── Home indicator ─────────────────────────────────────────────────────────── */
.home-indicator {
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.home-bar {
  width: 134px;
  height: 5px;
  background: rgba(255,255,255,0.4);
  border-radius: 3px;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   ICON COLOUR PALETTE — iOS 7.0 launch state
   These are approximations of the original iOS 7 icon colours.
   The palette is the exhibit's primary defense evidence:
   twenty objects sharing grammar, colour family, and form.
   ═══════════════════════════════════════════════════════════════════════════════ */

.ic-phone    { background: linear-gradient(175deg, #5CC85C 0%, #34A834 100%); }
.ic-msgs     { background: linear-gradient(175deg, #5CC85C 0%, #34A834 100%); }

.ic-maps     { background: linear-gradient(168deg, #C8E8A0 0%, #7CC860 40%, #88CCCC 80%, #5AABF0 100%); }
.ic-weather  { background: linear-gradient(175deg, #5ABCF0 0%, #4AA0E0 100%); }
.ic-clock    { background: #1C1C1E; border: 0.5px solid rgba(255,255,255,0.08); }

/* Row 3 */
.ic-camera   { background: linear-gradient(175deg, #3A3A3C 0%, #1C1C1E 100%); }
.ic-photos   { background: #FFFFFF; }
.ic-music    { background: linear-gradient(175deg, #FC3158 0%, #E8003A 100%); }
.ic-podcasts { background: linear-gradient(175deg, #C864C8 0%, #8B008B 100%); }

/* Row 4 */
.ic-appstore { background: linear-gradient(175deg, #4AC8FA 0%, #0C78FF 100%); }
.ic-itunes   { background: linear-gradient(175deg, #FC3158 0%, #E8003A 100%); }
.ic-gamectr  { background: linear-gradient(135deg, #5CC85C 0%, #5ABCF0 50%, #FC3158 100%); }
.ic-passbook { background: linear-gradient(175deg, #5CC85C 0%, #28A428 100%); }

/* Row 5 */
.ic-settings { background: linear-gradient(175deg, #8E8E93 0%, #636366 100%); }
.ic-notes    { background: linear-gradient(175deg, #FCCE2C 0%, #FCAC08 100%); }
.ic-remindrs { background: #FFFFFF; }
.ic-newsstnd { background: linear-gradient(168deg, #C89050 0%, #A07030 60%, #784A18 100%); }

</style>
