  <text x="262" y="800" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A8A8E" text-anchor="middle">Alerts</text>

  <text x="337" y="780" font-family="system-ui, -apple-system, sans-serif" font-size="20" text-anchor="middle">👤</text>
  <text x="337" y="800" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A8A8E" text-anchor="middle">Profile</text>

